[project]
name = "geopin"
version = "0.1.0"
description = "Per-frame trajectory projection for DJI video + KML marks."
channels = ["conda-forge"]
platforms = ["win-64", "linux-64", "osx-64", "osx-arm64"]

[dependencies]
python = ">=3.10,<3.15"
ffmpeg = ">=7,<8"
numpy = ">=1.26,<3"
pymap3d = ">=3.1,<4"
typer = ">=0.12,<1"

[tasks]
geopin = "python main.py"
help = "python main.py --help"
dry-run = "python main.py --dry-run"
